{% extends "base/base.html" %}
{% block content %}

<h2>My Leaves</h2>

<table border="1">
    <tr>
        <th>Leave Type</th>
        <th>Start Date</th>
        <th>End Date</th>
        <th>Status</th>
    </tr>

    {% for leave in leaves %}
    <tr>
        <td>{{ leave.leave_type }}</td>
        <td>{{ leave.start_date }}</td>
        <td>{{ leave.end_date }}</td>
        <td>{{ leave.status }}</td>
    </tr>
    {% empty %}
    <tr>
        <td colspan="4">No leaves applied.</td>
    </tr>
    {% endfor %}

</table>
{% endblock  %}
