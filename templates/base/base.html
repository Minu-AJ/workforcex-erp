<!DOCTYPE html>
<html>
<head>
    <title>HRMS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    
    <style>
    .nav-link:hover {
        background-color: #0d6efd;
        transition: 0.3s;
    }
    </style>
</head>
<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3 vh-100 position-fixed" style="width: 250px;">
        <h4 class="mb-4">HRMS</h4>

        <ul class="nav nav-pills flex-column">

            <li class="nav-item mb-2">
                <a href="{% url 'dashboard' %}" class="nav-link text-white {% if request.path == '/' %}active bg-primary{% endif %}">
                    <i class="bi bi-speedometer2 me-2"></i> Dashboard
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="/employees/" class="nav-link text-white {% if '/employees' in request.path %}active bg-primary{% endif %}">
                    <i class="bi bi-people-fill me-2"></i> Employees
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="/attendance/mark/" class="nav-link text-white {% if '/attendance' in request.path %}active bg-primary{% endif %}">
                    <i class="bi bi-clock-history me-2"></i> Attendance
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="/leaves/" class="nav-link text-white {% if '/leaves' in request.path %}active bg-primary{% endif %}">
                   <i class="bi bi-calendar-check me-2"></i> Leaves
                </a>
            </li>

            <li class="nav-item mb-2">
                <a href="/payroll/" class="nav-link text-white {% if '/payroll' in request.path %}active bg-primary{% endif %}">
                    <i class="bi bi-cash-stack me-2"></i> Payroll
                </a>
            </li>

            <li class="nav-item mt-4">
                <form action="{% url 'logout' %}" method="post">
                    {% csrf_token %}
                    <button type="submit" class="nav-link text-danger border-0 bg-transparent">
                    <i class="bi bi-box-arrow-right me-2"></i>Logout
                    </button>

                </form>
            </li>

            <li class="nav-item mt-3">
                <button id="themeToggle" class="btn btn-outline-light w-100">
                    <i class="bi bi-moon-fill" id="themeIcon"></i>
                    <span id="themeText">Dark Mode</span>
                </button>
            </li>

        </ul>
    </div>

    <!-- Main Content -->
    <div class="flex-grow-1 p-4 bg-light" style="margin-left: 250px;">
        {% block content %}
        {% endblock %}
    </div>

</div>

</body>
</html>
